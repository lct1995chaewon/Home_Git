<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>將軍澳巴士到站 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang HK', 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .pulse { animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .spin { animation: spin 0.8s linear infinite; display:inline-block; }
        @keyframes spin { to{transform:rotate(360deg)} }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .weather-bar {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            transition: border-color 0.3s;
        }
        .card:hover { border-color: #60a5fa; }
        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            font-size: 1rem;
            font-weight: 600;
        }
        .eta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(51,65,85,0.6);
        }
        .eta-row:last-child { border-bottom: none; }

        .route-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            min-width: 50px;
        }
        .warning-banner {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #7f1d1d, #991b1b);
            border: 1px solid #dc2626;
            border-radius: 12px;
            padding: 14px 20px;
            display: none;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
        }
        .warning-banner.active { display: flex; }

        .mtr-line {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .mtr-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #a855f7;
        }

        .weather-icon { font-size: 2.2rem; }
        .temp-display { font-size: 2.5rem; font-weight: 700; }

        .status-bar {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: #1e293b;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .weather-bar { grid-template-columns: 1fr; }
        }

        /* iPad landscape optimization */
        @media (min-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr 1fr;
                padding: 24px 32px;
                gap: 24px;
            }
            .weather-bar {
                grid-column: 1 / -1;
                grid-template-columns: 1fr 1fr;
            }
            .card { padding: 24px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div style="text-align:center;padding:20px 20px 0;">
        <h1 style="font-size:1.6rem;margin:0;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
            🚌 將軍澳交通天氣 Dashboard
        </h1>
    </div>

    <div class="dashboard-grid" id="main-grid">
        <!-- Warning Banner -->
        <div class="warning-banner" id="warning-banner">
            <span style="font-size:1.5rem;">⚠️</span>
            <span id="warning-text">載入中...</span>
        </div>

        <!-- Weather Section -->
        <div class="weather-bar">
            <!-- Sai Kung Weather -->
            <div class="card" id="weather-card">
                <div class="card-title">🌤️ 西貢天氣</div>
                <div style="display:flex;align-items:center;justify-content:space-between;">
                    <div>
                        <div class="temp-display" id="sai-kung-temp">--°C</div>
                        <div style="color:#94a3b8;font-size:0.9rem;margin-top:4px;" id="sai-kung-humidity">濕度: --%</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:0.85rem;color:#94a3b8;" id="weather-desc">載入中...</div>
                        <div style="font-size:0.8rem;color:#64748b;margin-top:4px;" id="rainfall-info"></div>
                        <div style="font-size:0.8rem;color:#64748b;margin-top:2px;" id="uv-info"></div>
                    </div>
                </div>
            </div>

            <!-- Weather Warnings -->
            <div class="card" id="warning-card">
                <div class="card-title">🚨 天氣警告信號</div>
                <div id="warning-list" style="font-size:0.95rem;">
                    <div style="color:#64748b;">載入中...</div>
                </div>
            </div>
        </div>

        <!-- MTR Card -->
        <div class="card">
            <div class="card-title">
                <span style="background:#a855f7;color:white;padding:3px 10px;border-radius:6px;font-size:0.85rem;font-weight:700;">將軍澳綫</span>
                將軍澳站
            </div>
            <div id="mtr-eta" style="font-size:0.9rem;">
                <div style="color:#64748b;text-align:center;padding:16px;">載入中...</div>
            </div>
        </div>

        <!-- Bus: CTB 798 -->
        <div class="card">
            <div class="card-title">
                <span class="route-badge" style="background:#eab308;color:#1e293b;">798</span>
                <div>
                    <div>城巴 798</div>
                    <div style="font-size:0.75rem;color:#94a3b8;font-weight:400;" id="stop-name-798">將軍澳廣場</div>
                </div>
            </div>
            <div id="eta-798">
                <div style="color:#64748b;text-align:center;padding:16px;">載入中...</div>
            </div>
        </div>

        <!-- Bus: KMB 296C -->
        <div class="card">
            <div class="card-title">
                <span class="route-badge" style="background:#ef4444;color:white;">296C</span>
                <div>
                    <div>九巴 296C</div>
                    <div style="font-size:0.75rem;color:#94a3b8;font-weight:400;" id="stop-name-296c">尚德總站</div>
                </div>
            </div>
            <div id="eta-296c">
                <div style="color:#64748b;text-align:center;padding:16px;">載入中...</div>
            </div>
        </div>

        <!-- Bus: CTB E22A -->
        <div class="card">
            <div class="card-title">
                <span class="route-badge" style="background:#06b6d4;color:white;">E22A</span>
                <div>
                    <div>城巴 E22A</div>
                    <div style="font-size:0.75rem;color:#94a3b8;font-weight:400;" id="stop-name-e22a">將軍澳站</div>
                </div>
            </div>
            <div id="eta-e22a">
                <div style="color:#64748b;text-align:center;padding:16px;">載入中...</div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <span id="status" style="font-size:0.85rem;color:#94a3b8;">載入中...</span>
            <button onclick="refreshAll()" style="background:#3b82f6;color:white;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;">🔄 更新</button>
        </div>
    </div>

    <script>
        // ========== CONFIG ==========
        const BUS_ROUTES = [
            { id: '798', company: 'CTB', route: '798', stopNameMatch: '將軍澳廣場', direction: 'outbound', elemId: 'eta-798', stopNameElemId: 'stop-name-798' },
            { id: '296c', company: 'KMB', route: '296C', stopNameMatch: '尚德', direction: 'outbound', elemId: 'eta-296c', stopNameElemId: 'stop-name-296c' },
            { id: 'e22a', company: 'CTB', route: 'E22A', stopNameMatch: '將軍澳', direction: 'inbound', elemId: 'eta-e22a', stopNameElemId: 'stop-name-e22a' }
        ];

        let resolvedStops = {};
        let refreshTimer = null;

        // ========== INIT ==========
        async function init() {
            // Resolve bus stops
            await resolveAllStops();
            // Fetch everything
            await refreshAll();
            // Auto refresh every 30s
            refreshTimer = setInterval(refreshAll, 30000);
        }

        // ========== RESOLVE BUS STOPS ==========
        async function resolveAllStops() {
            for (let cfg of BUS_ROUTES) {
                try {
                    let stopId = null;
                    let stopName = '';

                    if (cfg.company === 'KMB') {
                        stopId = await resolveKMBStop(cfg.route, cfg.direction, cfg.stopNameMatch);
                        if (!stopId) stopId = await resolveKMBStop(cfg.route, cfg.direction === 'outbound' ? 'inbound' : 'outbound', cfg.stopNameMatch);
                    } else {
                        stopId = await resolveCTBStop(cfg.route, cfg.direction, cfg.stopNameMatch);
                        if (!stopId) stopId = await resolveCTBStop(cfg.route, cfg.direction === 'outbound' ? 'inbound' : 'outbound', cfg.stopNameMatch);
                    }

                    if (stopId) {
                        resolvedStops[cfg.id] = stopId;
                    }
                } catch(e) {
                    console.error(`Failed to resolve ${cfg.route}:`, e);
                }
            }
        }

        async function resolveKMBStop(route, direction, nameMatch) {
            const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${direction}/1`);
            const data = await res.json();
            for (let rs of (data.data || [])) {
                const stopRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${rs.stop}`);
                const stopData = await stopRes.json();
                if (stopData.data && stopData.data.name_tc.includes(nameMatch)) {
                    return { stopId: rs.stop, stopName: stopData.data.name_tc };
                }
            }
            return null;
        }

        async function resolveCTBStop(route, direction, nameMatch) {
            const res = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/${route}/${direction}`);
            const data = await res.json();
            for (let rs of (data.data || [])) {
                const stopRes = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/stop/${rs.stop}`);
                const stopData = await stopRes.json();
                if (stopData.data && stopData.data.name_tc.includes(nameMatch)) {
                    return { stopId: rs.stop, stopName: stopData.data.name_tc };
                }
            }
            return null;
        }

        // ========== REFRESH ALL ==========
        async function refreshAll() {
            document.getElementById('status').innerHTML = '<span class="spin">⟳</span> 更新中...';
            await Promise.all([
                refreshWeather(),
                refreshWarnings(),
                refreshMTR(),
                ...BUS_ROUTES.map(cfg => refreshBusETA(cfg))
            ]);
            const now = new Date();
            document.getElementById('status').textContent = `上次更新: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')} · 每30秒自動更新`;
        }

        // ========== WEATHER ==========
        async function refreshWeather() {
            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const data = await res.json();

                // Find Sai Kung temperature
                let temp = '--';
                if (data.temperature && data.temperature.data) {
                    const sk = data.temperature.data.find(d => d.place.includes('西貢') || d.place.includes('將軍澳'));
                    if (sk) temp = sk.value;
                    else if (data.temperature.data.length > 0) {
                        // fallback: find closest or use Sai Kung
                        const fallback = data.temperature.data.find(d => d.place.includes('西貢')) || data.temperature.data.find(d => d.place.includes('黃竹坑')) || data.temperature.data[0];
                        temp = fallback.value;
                    }
                }
                document.getElementById('sai-kung-temp').textContent = `${temp}°C`;

                // Humidity
                let humidity = '--';
                if (data.humidity && data.humidity.data && data.humidity.data.length > 0) {
                    humidity = data.humidity.data[0].value;
                }
                document.getElementById('sai-kung-humidity').textContent = `濕度: ${humidity}%`;

                // Rainfall at Sai Kung
                if (data.rainfall && data.rainfall.data) {
                    const skRain = data.rainfall.data.find(d => d.place.includes('西貢'));
                    if (skRain) {
                        document.getElementById('rainfall-info').textContent = `降雨量: ${skRain.max}mm`;
                    }
                }

                // UV
                if (data.uvindex && data.uvindex.data && data.uvindex.data.length > 0) {
                    document.getElementById('uv-info').textContent = `紫外線: ${data.uvindex.data[0].value}`;
                }

                // Icon / description
                if (data.icon && data.icon.length > 0) {
                    const iconCode = data.icon[0];
                    const weatherEmoji = getWeatherEmoji(iconCode);
                    document.getElementById('weather-desc').textContent = weatherEmoji + ' ' + (getWeatherDesc(iconCode) || '');
                }

            } catch(e) {
                document.getElementById('sai-kung-temp').textContent = '載入失敗';
                console.error('Weather error:', e);
            }
        }

        function getWeatherEmoji(code) {
            const map = {50:'☀️',51:'☀️',52:'🌤️',53:'⛅',54:'🌥️',60:'🌧️',61:'🌧️',62:'⛈️',63:'🌦️',64:'🌧️',65:'⛈️',70:'☁️',71:'☁️',72:'☁️',73:'☁️',74:'☁️',75:'☁️',76:'🌫️',77:'🌫️',80:'🌪️',81:'🌊',82:'🌧️',83:'❄️',84:'❄️',85:'❄️'};
            return map[code] || '🌤️';
        }

        function getWeatherDesc(code) {
            const map = {50:'陽光充沛',51:'間有陽光',52:'短暫陽光',53:'多雲',54:'大致多雲',60:'有雨',61:'間中有雨',62:'有驟雨',63:'有雷雨',64:'持續大雨',65:'暴雨',70:'天色良好',71:'天色良好',72:'天色良好',73:'天色良好',76:'薄霧',77:'霧',80:'大風',81:'乾燥',82:'潮濕',83:'寒冷',84:'嚴寒',85:'酷熱'};
            return map[code] || '';
        }

        // ========== WARNINGS ==========
        async function refreshWarnings() {
            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
                const data = await res.json();

                const warningList = document.getElementById('warning-list');
                const warningBanner = document.getElementById('warning-banner');

                if (!data || Object.keys(data).length === 0 || (data && !Object.keys(data).some(k => k !== 'WFIRE' && data[k]))) {
                    // Check if there are actual warnings
                    let hasWarnings = false;
                    let warningsHtml = '';
                    let bannerTexts = [];

                    if (data) {
                        for (let key of Object.keys(data)) {
                            if (data[key] && data[key].name) {
                                hasWarnings = true;
                                const w = data[key];
                                const emoji = getWarningEmoji(key);
                                warningsHtml += `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #334155;">
                                    <span style="font-size:1.3rem;">${emoji}</span>
                                    <span>${w.name}${w.type ? ' - ' + w.type : ''}</span>
                                </div>`;
                                bannerTexts.push(w.name);
                            }
                        }
                    }

                    if (hasWarnings) {
                        warningList.innerHTML = warningsHtml;
                        warningBanner.classList.add('active');
                        document.getElementById('warning-text').textContent = bannerTexts.join(' | ');
                    } else {
                        warningList.innerHTML = '<div style="color:#4ade80;display:flex;align-items:center;gap:8px;"><span style="font-size:1.2rem;">✅</span> 目前沒有天氣警告</div>';
                        warningBanner.classList.remove('active');
                    }
                } else {
                    // Parse warnings
                    let hasWarnings = false;
                    let warningsHtml = '';
                    let bannerTexts = [];

                    for (let key of Object.keys(data)) {
                        if (data[key] && data[key].name) {
                            hasWarnings = true;
                            const w = data[key];
                            const emoji = getWarningEmoji(key);
                            warningsHtml += `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #334155;">
                                <span style="font-size:1.3rem;">${emoji}</span>
                                <span style="font-weight:500;">${w.name}${w.type ? ' - ' + w.type : ''}</span>
                            </div>`;
                            bannerTexts.push(w.name);
                        }
                    }

                    if (hasWarnings) {
                        warningList.innerHTML = warningsHtml;
                        warningBanner.classList.add('active');
                        document.getElementById('warning-text').textContent = bannerTexts.join(' | ');
                    } else {
                        warningList.innerHTML = '<div style="color:#4ade80;display:flex;align-items:center;gap:8px;"><span style="font-size:1.2rem;">✅</span> 目前沒有天氣警告</div>';
                        warningBanner.classList.remove('active');
                    }
                }
            } catch(e) {
                document.getElementById('warning-list').innerHTML = '<div style="color:#ef4444;">載入失敗</div>';
                console.error('Warning error:', e);
            }
        }

        function getWarningEmoji(code) {
            const map = { WTCSGNL:'🌀', WRAIN:'🌧️', WFROST:'❄️', WHOT:'🌡️', WCOLD:'🥶', WMSGNL:'🌊', WTMW:'🌊', WFIRE:'🔥', WL:'⚡', WFNTSA:'🌊', WTCPRE8:'🌀', WFIRER:'🔥' };
            return map[code] || '⚠️';
        }

        // ========== MTR ==========
        async function refreshMTR() {
            try {
                const res = await fetch('https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=TKL&sta=TKO');
                const data = await res.json();

                const mtrDiv = document.getElementById('mtr-eta');

                if (data.status === 0 || !data.data || !data.data['TKL-TKO']) {
                    mtrDiv.innerHTML = '<div style="color:#64748b;text-align:center;padding:12px;">暫無列車資料</div>';
                    return;
                }

                const stationData = data.data['TKL-TKO'];
                let html = '';

                // UP direction (towards North Point / Quarry Bay)
                if (stationData.UP && stationData.UP.length > 0) {
                    html += '<div style="margin-bottom:12px;"><div style="font-size:0.8rem;color:#a78bfa;font-weight:600;margin-bottom:6px;">▲ 往北角 / 調景嶺方向</div>';
                    for (let train of stationData.UP.slice(0, 3)) {
                        const mins = getTrainMinutes(train.time);
                        const minClass = mins <= 1 ? 'color:#ef4444;' : mins <= 3 ? 'color:#fb923c;' : 'color:#4ade80;';
                        const pulseClass = mins <= 1 ? 'pulse' : '';
                        html += `<div class="eta-row">
                            <div class="mtr-line"><div class="mtr-dot"></div><span style="font-size:0.85rem;">${train.dest || '北角'} ${train.plat ? '(月台'+train.plat+')' : ''}</span></div>
                            <div class="${pulseClass}" style="font-weight:700;font-size:1.1rem;${minClass}">${mins <= 0 ? '即將開出' : mins + ' 分鐘'}</div>
                        </div>`;
                    }
                    html += '</div>';
                }

                // DOWN direction (towards Po Lam / LOHAS Park)
                if (stationData.DOWN && stationData.DOWN.length > 0) {
                    html += '<div><div style="font-size:0.8rem;color:#60a5fa;font-weight:600;margin-bottom:6px;">▼ 往寶琳 / 康城方向</div>';
                    for (let train of stationData.DOWN.slice(0, 3)) {
                        const mins = getTrainMinutes(train.time);
                        const minClass = mins <= 1 ? 'color:#ef4444;' : mins <= 3 ? 'color:#fb923c;' : 'color:#4ade80;';
                        const pulseClass = mins <= 1 ? 'pulse' : '';
                        html += `<div class="eta-row">
                            <div class="mtr-line"><div class="mtr-dot" style="background:#60a5fa;"></div><span style="font-size:0.85rem;">${train.dest || '寶琳'} ${train.plat ? '(月台'+train.plat+')' : ''}</span></div>
                            <div class="${pulseClass}" style="font-weight:700;font-size:1.1rem;${minClass}">${mins <= 0 ? '即將開出' : mins + ' 分鐘'}</div>
                        </div>`;
                    }
                    html += '</div>';
                }

                if (!html) html = '<div style="color:#64748b;text-align:center;padding:12px;">暫無列車資料</div>';
                mtrDiv.innerHTML = html;

            } catch(e) {
                document.getElementById('mtr-eta').innerHTML = '<div style="color:#ef4444;text-align:center;padding:12px;">載入失敗</div>';
                console.error('MTR error:', e);
            }
        }

        function getTrainMinutes(timeStr) {
            if (!timeStr) return 99;
            const trainTime = new Date(timeStr);
            const now = new Date();
            return Math.round((trainTime - now) / 60000);
        }

        // ========== BUS ETA ==========
        async function refreshBusETA(cfg) {
            const elem = document.getElementById(cfg.elemId);
            const resolved = resolvedStops[cfg.id];

            if (!resolved || !resolved.stopId) {
                elem.innerHTML = '<div style="color:#ef4444;text-align:center;padding:12px;">找不到巴士站</div>';
                return;
            }

            // Update stop name
            document.getElementById(cfg.stopNameElemId).textContent = resolved.stopName;

            try {
                let etas = [];

                if (cfg.company === 'KMB') {
                    const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${resolved.stopId}/${cfg.route}/1`);
                    const data = await res.json();
                    etas = (data.data || []).filter(e => e.eta);
                } else {
                    const res = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${resolved.stopId}/${cfg.route}`);
                    const data = await res.json();
                    etas = (data.data || []).filter(e => e.eta);
                }

                if (etas.length === 0) {
                    elem.innerHTML = '<div style="color:#64748b;text-align:center;padding:12px;">暫無到站資料</div>';
                    return;
                }

                let html = '';
                const labels = ['下一班', '第二班', '第三班', '第四班'];
                for (let i = 0; i < Math.min(etas.length, 4); i++) {
                    const eta = etas[i];
                    const mins = getBusMinutes(eta.eta);
                    const etaTime = new Date(eta.eta);
                    const timeStr = `${etaTime.getHours().toString().padStart(2,'0')}:${etaTime.getMinutes().toString().padStart(2,'0')}`;
                    const dest = eta.dest_tc || eta.dest_en || '';
                    const rmk = eta.rmk_tc || eta.rmk_en || '';

                    let minDisplay, minStyle;
                    if (mins <= 0) { minDisplay = '即將到達'; minStyle = 'color:#ef4444;'; }
                    else if (mins <= 3) { minDisplay = `${mins} 分鐘`; minStyle = 'color:#fb923c;'; }
                    else { minDisplay = `${mins} 分鐘`; minStyle = 'color:#4ade80;'; }

                    const pulseClass = mins <= 1 ? 'pulse' : '';

                    html += `<div class="eta-row">
                        <div>
                            <div style="font-size:0.75rem;color:#64748b;">${labels[i]}${dest ? ' → ' + dest : ''}</div>
                            <div style="font-size:0.8rem;color:#94a3b8;margin-top:2px;">${timeStr}${rmk ? ' (' + rmk + ')' : ''}</div>
                        </div>
                        <div class="${pulseClass}" style="font-weight:700;font-size:1.2rem;${minStyle}">${minDisplay}</div>
                    </div>`;
                }

                elem.innerHTML = html;
            } catch(e) {
                elem.innerHTML = '<div style="color:#ef4444;text-align:center;padding:12px;">載入失敗</div>';
                console.error(`Bus ${cfg.route} error:`, e);
            }
        }

        function getBusMinutes(etaStr) {
            if (!etaStr) return 99;
            return Math.round((new Date(etaStr) - new Date()) / 60000);
        }

        // ========== START ==========
        init();
    </script>
</body>
</html>
